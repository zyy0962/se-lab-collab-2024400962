name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # 阶段1：单元测试
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pytest -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: 运行单元测试
        run: python -m pytest test_app.py -v

  # 阶段2：构建并推送 Docker 镜像
  build-and-push:
    name: 构建并推送 Docker 镜像
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 获取短 SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:${{ steps.vars.outputs.sha_short }}

  # 阶段3：部署（可选，需配置 secrets）
  deploy:
    name: 部署到服务器
    needs: build-and-push
    runs-on: ubuntu-latest
    if: false  # 改为 true 并配置 secrets 后启用
    steps:
      - name: SSH 部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest
            docker stop se-web-app || true
            docker rm se-web-app || true
            docker run -d --name se-web-app -p 80:5000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest
            docker image prune -f
