name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 阶段1：单元测试
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 运行单元测试
        run: python -m pytest test_app.py -v

  # 阶段2：构建并推送 Docker 镜像
  build-and-push:
    name: 构建并推送 Docker 镜像
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: 获取短 SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 构建并推送镜像
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:${{ steps.vars.outputs.sha_short }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:${{ steps.vars.outputs.sha_short }}
